services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:${HA_VERSION:-stable}
    container_name: ha-anker-solix-dev
    restart: unless-stopped
    volumes:
      - ./config:/config
      - ./custom_components/anker_solix:/config/custom_components/anker_solix:ro
    environment:
      - TZ=${TZ:-UTC}
    ports:
      - "${HA_PORT:-8123}:8123"
